<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level 1 · Study Tracker 2025</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef0f3;color:#1a1a2e;padding:20px}
.container{max-width:820px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.header h1 span{color:#e74c3c}
.stats{display:flex;justify-content:center;gap:20px;font-size:13px;color:#555;flex-wrap:wrap}
.stats strong{color:#1a1a2e}
.progress-main{height:8px;background:#e0e0e0;border-radius:4px;margin:12px 0 8px;overflow:hidden}
.progress-main .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2ecc71,#27ae60);transition:width .4s}
.legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.legend-item{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;color:#fff}
.legend-item.skim{color:#333}
#backlogBar{display:none;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px}
#backlogBar.danger{display:flex;background:#fff0f0;border:1px solid #ffd4d4;color:#c0392b}
#backlogBar .pulse-dot{display:inline-block;animation:blip 1.5s ease-in-out infinite;border-radius:50%;width:10px;height:10px;background:#e74c3c;flex-shrink:0}
@keyframes blip{0%,100%{box-shadow:0 0 0 2px rgba(231,76,60,.2)}50%{box-shadow:0 0 0 5px rgba(231,76,60,.5)}}
@keyframes backlog-pulse{0%,100%{box-shadow:inset 4px 0 0 0 #e74c3c,0 0 0 1px rgba(231,76,60,.08)}50%{box-shadow:inset 4px 0 0 0 #e74c3c,0 0 6px 2px rgba(231,76,60,.3)}}
.week-card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
.week-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f7f8fa}
.week-header .num{font-weight:700;font-size:14px;white-space:nowrap}
.week-header .range{font-size:12px;color:#777;white-space:nowrap}
.week-header .wk-bar{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;min-width:40px}
.week-header .wk-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2ecc71,#27ae60);transition:width .3s}
.week-header .wk-count{font-size:11px;color:#888;font-weight:600;white-space:nowrap}
.day-row{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid #f0f0f0;transition:background .15s;position:relative}
.day-row:hover{background:#fafbfc}
.day-row.today{background:#f0f7ff}
.day-row.done{opacity:.6}
.day-row.done .topic-text{text-decoration:line-through}
.day-row.done .check{opacity:.4}
.day-row.backlog{animation:backlog-pulse 2s ease-in-out infinite}
.day-row.backlog .backlog-badge{display:inline}
.backlog-badge{display:none;font-size:10px;color:#e74c3c;font-weight:700;margin-left:2px}
.check{width:22px;height:22px;cursor:pointer;accent-color:#2ecc71;flex-shrink:0}
.day-date{font-size:12px;color:#555;min-width:90px;flex-shrink:0}
.day-date .dow{font-weight:600}
.topic-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;flex-shrink:0;min-width:36px;text-align:center}
.p0{background:#e74c3c}.p1{background:#e67e22}.p2{background:#d4a017}.p3{background:#27ae60}.p4{background:#95a5a6;color:#333}
.p-mix{background:#8e44ad}.p-rest{background:#ddd;color:#666}.p-exam{background:#2c3e50}
.activity-text{font-size:13px;color:#333;flex:1;min-width:0;line-height:1.3}
.qb-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qb-wrap label{font-size:10px;color:#999;font-weight:600}
.qb-wrap input{width:48px;height:26px;font-size:12px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:0;outline:none}
.qb-wrap input:focus{border-color:#3498db}
.sort-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.sort-controls button{padding:6px 14px;font-size:11px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-weight:600;color:#555;transition:all .15s}
.sort-controls button:hover{border-color:#aaa;background:#f5f5f5}
.sort-controls button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.empty-state{text-align:center;padding:40px 20px;color:#999;font-size:14px}
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px;padding:12px 0}
@media(max-width:600px){
  body{padding:10px}
  .container{max-width:100%}
  .day-row{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .day-date{min-width:70px;font-size:11px}
  .activity-text{font-size:12px;width:100%;order:10;padding-left:30px}
  .qb-wrap{margin-left:auto}
  .stats{gap:12px;font-size:12px}
  .week-header{padding:10px 12px;flex-wrap:wrap}
  .week-header .num{font-size:13px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CFA<span>®</span> Level<span> </span>1 · Study Tracker 2025</h1>
    <div class="stats" id="statsBar">
      <span>Progress: <strong id="overallPct">0%</strong></span>
      <span>Days: <strong id="daysDone">0</strong>/147</span>
      <span>Qbank: <strong id="totalQb">0</strong></span>
    </div>
    <div class="progress-main"><div class="fill" id="overallBar" style="width:0%"></div></div>
  </div>
  <div id="backlogBar"><span class="pulse-dot"></span><span id="backlogMsg"></span></div>
  <div class="legend" id="legend"></div>
  <div class="sort-controls">
    <button class="active" data-filter="all">All weeks</button>
    <button data-filter="active">This week & ahead</button>
    <button data-filter="backlog">Backlog only</button>
  </div>
  <div id="weeksContainer"></div>
  <div class="footer">Data saves automatically in your browser</div>
</div>
<script>
const SCHEDULE_YEAR = 2025;
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_IDX = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const TOPIC_NAME = {ETH:'Ethics',FRA:'FRA',QNT:'Quant',FI:'Fixed Inc',EQ:'Equity',CF:'Corp Fin',ECON:'Econ',PM:'Portfolio',DER:'Derivatives',ALT:'Alts',MIX:'Review',REST:'Rest',EXAM:'Exam'};
const TOPIC_COLORS = {ETH:'p0',FRA:'p0',QNT:'p1',FI:'p1',EQ:'p1',CF:'p2',ECON:'p2',PM:'p3',DER:'p3',ALT:'p3',MIX:'p-mix',REST:'p-rest',EXAM:'p-exam'};
const PRIORITIES = [
  {key:'unskippable',label:'Unskippable',cls:'p0',topics:'Ethics · FRA'},
  {key:'high',label:'High',cls:'p1',topics:'Fixed Inc · Equity · Quant'},
  {key:'medium',label:'Medium',cls:'p2',topics:'Corp Fin · Economics'},
  {key:'low',label:'Lower',cls:'p3',topics:'Portfolio · Derivatives · Alts'},
  {key:'skim',label:'Skim',cls:'p4',topics:'GIPS'}
];

const DATA = [
{week:1,dates:'Jun 9-15',days:[
  {t:'ETH',a:'Standards I (Professionalism)'},{t:'ETH',a:'Standards II (Integrity of Capital Markets)'},{t:'ETH',a:'Standards III (Duties to Clients)'},{t:'ETH',a:'Standards IV (Duties to Employers)'},{t:'ETH',a:'EOC Qs Standards I-IV'},{t:'ETH',a:'Re-read weak areas'},{t:'ETH',a:'Qbank 30 Qs'}
]},
{week:2,dates:'Jun 16-22',days:[
  {t:'ETH',a:'Standards V (Investment Analysis)'},{t:'ETH',a:'Standards VI (Conflicts of Interest)'},{t:'ETH',a:'Standard VII + GIPS overview'},{t:'ETH',a:'EOC + ethics case vignettes'},{t:'ETH',a:'Full Ethics review'},{t:'ETH',a:'Go through all standards'},{t:'ETH',a:'Qbank ethics questions'}
]},
{week:3,dates:'Jun 23-29',days:[
  {t:'QNT',a:'Time Value of Money'},{t:'QNT',a:'TVM: annuities, perpetuities'},{t:'QNT',a:'Statistical concepts'},{t:'QNT',a:'Measures: central tendency, dispersion'},{t:'QNT',a:'Probability, Bayes\' theorem'},{t:'QNT',a:'EOC questions'},{t:'QNT',a:'Re-do TVM problems'}
]},
{week:4,dates:'Jun 30-Jul 6',days:[
  {t:'QNT',a:'Probability distributions'},{t:'QNT',a:'Normal, binomial, t-distribution'},{t:'QNT',a:'Sampling & estimation'},{t:'QNT',a:'Confidence intervals'},{t:'QNT',a:'Hypothesis testing'},{t:'QNT',a:'Full Quant review'},{t:'QNT',a:'Qbank 40 Qs'}
]},
{week:5,dates:'Jul 7-13',days:[
  {t:'ECON',a:'Micro: demand/supply, elasticity'},{t:'ECON',a:'Micro: firm behaviour, markets'},{t:'ECON',a:'Macro: GDP, inflation, cycles'},{t:'ECON',a:'Macro: monetary & fiscal policy'},{t:'ECON',a:'Intl trade, currency exchange'},{t:'ECON',a:'Full Econ review'},{t:'ECON',a:'EOC questions'}
]},
{week:6,dates:'Jul 14-20',days:[
  {t:'FRA',a:'Financial reporting framework'},{t:'FRA',a:'Income statement, revenue recog.'},{t:'FRA',a:'Balance sheet'},{t:'FRA',a:'Statement of cash flows'},{t:'FRA',a:'Ratio analysis, DuPont'},{t:'FRA',a:'EOC questions'},{t:'FRA',a:'Re-read income statement'}
]},
{week:7,dates:'Jul 21-27',days:[
  {t:'FRA',a:'Inventories: FIFO, LIFO, avg'},{t:'FRA',a:'IFRS vs GAAP differences'},{t:'FRA',a:'Long-lived assets'},{t:'FRA',a:'Depreciation methods'},{t:'FRA',a:'Income taxes, deferred tax'},{t:'FRA',a:'EOC questions'},{t:'FRA',a:'IFRS vs GAAP summary table'}
]},
{week:8,dates:'Jul 28-Aug 3',days:[
  {t:'FRA',a:'Non-current liabilities, bonds'},{t:'FRA',a:'Leases: IFRS 16 / ASC 842'},{t:'FRA',a:'Intercorporate investments'},{t:'FRA',a:'Full FRA revision'},{t:'FRA',a:'Ratio cheat sheet'},{t:'FRA',a:'Qbank 50 FRA Qs'},{t:'FRA',a:'Review all wrong answers'}
]},
{week:9,dates:'Aug 4-10',days:[
  {t:'CF',a:'Capital budgeting: NPV, IRR'},{t:'CF',a:'Payback, profitability index'},{t:'CF',a:'WACC, cost of equity (CAPM)'},{t:'CF',a:'MCC schedule'},{t:'CF',a:'Capital structure, dividends'},{t:'CF',a:'Governance, ESG basics'},{t:'CF',a:'EOC questions'}
]},
{week:10,dates:'Aug 11-17',days:[
  {t:'EQ',a:'Market organisation, order types'},{t:'EQ',a:'Trading mechanisms'},{t:'EQ',a:'Security market indices'},{t:'EQ',a:'Market efficiency, anomalies'},{t:'EQ',a:'Equity securities overview'},{t:'EQ',a:'EOC questions'},{t:'EQ',a:'Qbank 30 Qs'}
]},
{week:11,dates:'Aug 18-24',days:[
  {t:'EQ',a:'Industry analysis: Porter\'s 5'},{t:'EQ',a:'Lifecycle, strategies'},{t:'EQ',a:'DDM: Gordon Growth Model'},{t:'EQ',a:'P/E, P/B, P/S, EV/EBITDA'},{t:'EQ',a:'Full equity review'},{t:'EQ',a:'EOC questions'},{t:'EQ',a:'Qbank 40 Qs'}
]},
{week:12,dates:'Aug 25-31',days:[
  {t:'FI',a:'Bond features, indenture'},{t:'FI',a:'Bond types, markets'},{t:'FI',a:'Bond valuation: pricing, YTM'},{t:'FI',a:'Spot rates, forward rates'},{t:'FI',a:'Yield measures, yield curve'},{t:'FI',a:'Term structure theories'},{t:'FI',a:'Bond math practice'}
]},
{week:13,dates:'Sep 1-7',days:[
  {t:'FI',a:'Macaulay duration'},{t:'FI',a:'Modified duration'},{t:'FI',a:'Convexity'},{t:'FI',a:'Credit risk, ratings, spreads'},{t:'FI',a:'Full FI review'},{t:'FI',a:'Qbank 50 FI Qs'},{t:'FI',a:'Review all errors'}
]},
{week:14,dates:'Sep 8-14',days:[
  {t:'DER',a:'Forwards, futures, swaps'},{t:'DER',a:'Payoff diagrams'},{t:'DER',a:'Options, put-call parity'},{t:'ALT',a:'Real estate, hedge funds, PE'},{t:'DER',a:'Both chapters review'},{t:'ALT',a:'Qbank 30 Qs'},{t:'MIX',a:'Derivatives + Alts review'}
]},
{week:15,dates:'Sep 15-21',days:[
  {t:'PM',a:'Portfolio theory, risk/return'},{t:'PM',a:'Diversification, efficient frontier'},{t:'PM',a:'CAPM, beta, SML'},{t:'PM',a:'IPS: RRTTLLU framework'},{t:'PM',a:'Behavioural finance overview'},{t:'PM',a:'Risk management'},{t:'PM',a:'EOC + full PM review'}
]},
{week:16,dates:'Sep 22-28',days:[
  {t:'ETH',a:'Re-read all standards'},{t:'ETH',a:'Qbank 40, grey-area vignettes'},{t:'QNT',a:'Formula sheet, TVM problems'},{t:'QNT',a:'Hypothesis testing review'},{t:'ECON',a:'Macro policy + exchange rates'},{t:'ECON',a:'Mixed Qbank 60 Qs'},{t:'MIX',a:'Review weak areas'}
]},
{week:17,dates:'Sep 29-Oct 5',days:[
  {t:'FRA',a:'Ratio sheet, IFRS vs GAAP'},{t:'FRA',a:'Adjustments: inventory, leases'},{t:'CF',a:'WACC, capital budgeting'},{t:'EQ',a:'Valuation models recap'},{t:'EQ',a:'Market structure recap'},{t:'MIX',a:'Mixed Qbank 60 Qs'},{t:'MIX',a:'Review errors'}
]},
{week:18,dates:'Oct 6-12',days:[
  {t:'FI',a:'Duration, credit spreads'},{t:'FI',a:'Yield curve theories'},{t:'DER',a:'Payoff diagrams, strategies'},{t:'MIX',a:'Alts + PM quick review'},{t:'MIX',a:'Mock Exam 1 AM (90 Qs)'},{t:'MIX',a:'Review Mock 1'},{t:'MIX',a:'Review errors'}
]},
{week:19,dates:'Oct 13-19',days:[
  {t:'MIX',a:'Deep review Mock 1 errors'},{t:'MIX',a:'Categorise mistakes'},{t:'MIX',a:'Top 2 weak topics revision'},{t:'MIX',a:'Continue weak topics'},{t:'MIX',a:'Mock Exam 2 PM (90 Qs)'},{t:'MIX',a:'Review Mock 2'},{t:'ETH',a:'Ethics Qbank 40 Qs'}
]},
{week:20,dates:'Oct 20-26',days:[
  {t:'MIX',a:'Formula drill: Quant, FRA'},{t:'MIX',a:'Formula drill: FI, CF'},{t:'MIX',a:'Mock Exam 3 AM (90 Qs)'},{t:'MIX',a:'Mock 3 review + Qbank'},{t:'MIX',a:'Qbank weakest 3 topics'},{t:'MIX',a:'Remaining Qbank Qs'},{t:'MIX',a:'Review all'}
]},
{week:21,dates:'Oct 27-Nov 1',days:[
  {t:'ETH',a:'All standards + GIPS notes'},{t:'MIX',a:'FRA cheat + FI duration'},{t:'MIX',a:'Quant formulas + Equity'},{t:'MIX',a:'Corp Fin+PM+Der flashcards'},{t:'REST',a:'Rest day — exam logistics'},{t:'EXAM',a:'EXAM DAY!'},{t:'EXAM',a:'EXAM DAY!'}
]}
];

const LS_KEY = 'cfa_tracker_2025';
let currentFilter = 'all';

function loadState(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch{return {}}}
function saveState(s){localStorage.setItem(LS_KEY,JSON.stringify(s))}
function getKey(w,d){return 'w'+w+'_d'+d}
function getQbKey(w,d){return 'q'+w+'_'+d}

function parseWeekStart(s){
  var m = s.match(/^(\w{3})\s+(\d+)/);
  return m ? new Date(SCHEDULE_YEAR, MONTH_IDX[m[1]], parseInt(m[2])) : null;
}
function fmtDate(d){
  return DAY_NAMES[d.getDay()==0?6:d.getDay()-1]+' '+d.getDate()+' '+MONTH_NAMES[d.getMonth()];
}
function isToday(d){
  var t=new Date();t.setHours(0,0,0,0);
  return d.getFullYear()==t.getFullYear()&&d.getMonth()==t.getMonth()&&d.getDate()==t.getDate();
}

function renderLegend(){
  var el=document.getElementById('legend');
  el.innerHTML=PRIORITIES.map(function(p){
    return '<span class="legend-item '+p.cls+'">'+p.label+'</span>';
  }).join('')+'<span class="legend-item" style="background:#8e44ad">Review</span>';
}

function renderWeeks(){
  var state=loadState(),container=document.getElementById('weeksContainer');
  var today=new Date();today.setHours(0,0,0,0);
  var totalDays=0,totalDone=0,totalQb=0,backlogCount=0;
  var html='',visible=0;

  DATA.forEach(function(w){
    var wkStart=parseWeekStart(w.dates);
    var wkEnd=wkStart?new Date(wkStart.getTime()+6*86400000):null;
    var wkDone=0,wkQb=0,wkBacklog=0;
    var rows='';
    var showWeek;
    if(currentFilter=='all')showWeek=true;
    else if(currentFilter=='active')showWeek=wkEnd&&wkEnd>=today;
    else showWeek=false;

    w.days.forEach(function(d,i){
      var ck=getKey(w.week,i),qk=getQbKey(w.week,i);
      var checked=state[ck]||false;
      var qb=parseInt(state[qk])||0;
      if(checked)wkDone++;
      wkQb+=qb;
      var dayDate=wkStart?new Date(wkStart.getTime()+i*86400000):null;
      var past=dayDate&&dayDate<today;
      var isBL=past&&!checked&&d.t!='REST'&&d.t!='EXAM';
      if(isBL){wkBacklog++;backlogCount++;}
      var tCls=TOPIC_COLORS[d.t]||'p4';
      var dn=checked?'done':'';
      var bl=isBL?'backlog':'';
      var td=isToday(dayDate)?'today':'';
      var doneAttr=checked?'checked':'';

      if(isBL)showWeek=true;
      rows+='<div class="day-row '+dn+' '+bl+' '+td+'" data-w="'+w.week+'" data-d="'+i+'">'+
        '<input type="checkbox" class="check" data-w="'+w.week+'" data-d="'+i+'" '+doneAttr+'>'+
        '<span class="day-date">'+(dayDate?fmtDate(dayDate):'')+'</span>'+
        '<span class="topic-pill '+tCls+'">'+d.t+'</span>'+
        '<span class="activity-text">'+d.a+'<span class="backlog-badge">⚠ OVERDUE</span></span>'+
        '<span class="qb-wrap"><label>Q</label><input type="number" class="qb-daily" data-w="'+w.week+'" data-d="'+i+'" value="'+(qb||'')+'" min="0" placeholder="0"></span>'+
        '</div>';
    });

    totalDays+=w.days.length;
    totalDone+=wkDone;
    totalQb+=wkQb;
    var pct=Math.round((wkDone/w.days.length)*100);

    if(showWeek){
      visible++;
      html+='<div class="week-card" data-week="'+w.week+'">'+
        '<div class="week-header">'+
          '<span class="num">Week '+w.week+'</span>'+
          '<span class="range">'+w.dates+'</span>'+
          '<span class="wk-bar"><span class="fill" style="width:'+pct+'%"></span></span>'+
          '<span class="wk-count">'+wkDone+'/'+w.days.length+'</span>'+
        '</div>'+rows+'</div>';
    }
  });

  if(visible==0&&currentFilter=='backlog'){
    html='<div class="empty-state">🎉 No backlog! Every day is up to date.</div>';
  }

  container.innerHTML=html;
  document.getElementById('overallPct').textContent=Math.round((totalDone/totalDays)*100)+'%';
  document.getElementById('overallBar').style.width=(totalDone/totalDays)*100+'%';
  document.getElementById('daysDone').textContent=totalDone;
  document.getElementById('totalQb').textContent=totalQb;

  var blBar=document.getElementById('backlogBar');
  var blMsg=document.getElementById('backlogMsg');
  if(backlogCount>0){
    blBar.className='danger';
    blMsg.textContent=backlogCount+' day'+(backlogCount>1?'s':'')+' overdue — mark them done to catch up';
  }else{
    blBar.className='';
    blMsg.textContent='';
  }
  attachEvents();
}

function attachEvents(){
  var c=document.getElementById('weeksContainer');
  c.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.onchange=function(){
      var s=loadState();
      s[getKey(parseInt(this.dataset.w),parseInt(this.dataset.d))]=this.checked;
      saveState(s);renderWeeks();
    };
  });
  c.querySelectorAll('.qb-daily').forEach(function(inp){
    inp.onchange=function(){
      var s=loadState();
      s[getQbKey(parseInt(this.dataset.w),parseInt(this.dataset.d))]=parseInt(this.value)||0;
      saveState(s);renderWeeks();
    };
  });
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.sort-controls button').forEach(function(b){
    b.className=b.dataset.filter==f?'active':'';
  });
  renderWeeks();
}

renderLegend();
renderWeeks();
document.querySelectorAll('.sort-controls button').forEach(function(b){
  b.onclick=function(){setFilter(this.dataset.filter);};
});
</script>
</body>
</html>
